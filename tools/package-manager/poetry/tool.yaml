# Poetry - Poetry - Python依赖管理
name: poetry
category: package-manager
description: "Poetry - Python依赖管理"
homepage: "https://python-poetry.org/"

tags:
  - poetry
  - python
  - dependencies
  - packaging
  - pyproject

supported_os:
