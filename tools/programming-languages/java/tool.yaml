# Java Development Kit
name: java
category: programming-language
description: "Java JDK - platform for building enterprise applications"
version: "21"
latest_version: "21"
lts_version: "21"
homepage: "https://adoptium.net/"
documentation: "https://docs.oracle.com/en/java/"
license: "GPL"
author: "OpenJDK"

tags:
  - java
  - jdk
  - spring
  - enterprise
  - android

supported_os:
  - linux
  - macos
  - windows

installation_sources:
  - type: apt
    os: [linux]
    package_name: openjdk-21-jdk
    description: "OpenJDK from apt"
    priority: 1

  - type: brew
    os: [macos]
    package_name: openjdk@21
    description: "Homebrew OpenJDK"
    priority: 1

  - type: manual
    os: [all]
    url: "https://adoptium.net/temurin/releases/"
    description: "Manual download"
    priority: 2

optional_tools:
  - name: maven
    description: "Maven build tool"
    recommended: true
  - name: gradle
    description: "Gradle build tool"
    recommended: true

environment_vars:
  JAVA_HOME: "/usr/lib/jvm/java-21-openjdk-amd64"
  PATH: "$JAVA_HOME/bin:$PATH"

post_install:
  - "java -version"

verify_commands:
  - "java -version"
  - "javac -version"

compatible_with:
  - maven
  - gradle
  - spring-boot

system_requirements:
  disk_space: "3GB"
  memory: "1GB minimum"
