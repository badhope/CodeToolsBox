# Terraform
name: terraform
category: devops
description: "Terraform - Infrastructure as Code"
version: "1.7"
latest_version: "1.7"
homepage: "https://developer.hashicorp.com/terraform"
documentation: "https://developer.hashicorp.com/terraform/docs"
license: "MPL 2.0"
author: "HashiCorp"

tags:
  - terraform
  - infrastructure-as-code
  - iac
  - devops
  - cloud

supported_os:
  - linux
  - macos
  - windows

installation_sources:
  - type: curl
    os: [linux, macos]
    description: "Official installation"
    priority: 1
    command: |
      wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
      echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
      sudo apt update && sudo apt install terraform

  - type: brew
    os: [macos]
    package_name: terraform
    description: "Homebrew"
    priority: 1

optional_tools:
  - name: terragrunt
    description: "Terraform wrapper"
    recommended: false

environment_vars:
  PATH: "/usr/local/bin:$PATH"

post_install:
  - "terraform version"

verify_commands:
  - "terraform version"

compatible_with:
  - aws-cli
  - gcloud-cli
  - azure-cli

system_requirements:
  disk_space: "200MB"
  memory: "512MB minimum"
