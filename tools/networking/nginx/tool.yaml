# Nginx
name: nginx
category: networking
description: "Nginx - High performance web server, reverse proxy, and load balancer"
version: "1.25"
latest_version: "1.25"
homepage: "https://nginx.org/"
documentation: "https://nginx.org/en/docs/"
license: "BSD 2-Clause"
author: "Nginx, Inc."

tags:
  - nginx
  - web-server
  - reverse-proxy
  - load-balancer
  - http
  - https

supported_os:
  - linux
  - macos
  - windows

installation_sources:
  - type: apt
    os: [linux]
    package_name: nginx
    description: "Apt repository"
    priority: 1
    command: |
      apt update && apt install -y nginx

  - type: homebrew
    os: [macos]
    package_name: nginx
    description: "Homebrew"
    priority: 1

  - type: docker
    os: [all]
    description: "Docker"
    priority: 2
    command: |
      docker run -d -p 80:80 -p 443:443 --name nginx nginx

optional_tools:
  - name: certbot
    description: "Certbot for Let's Encrypt"
    recommended: true
  - name: openssl
    description: "OpenSSL"
    recommended: true

verify_commands:
  - "nginx -v"
  - "nginx -t"

compatible_with:
  - docker
  - certbot
  - letsencrypt
