# DevOps Engineer Template
name: devops-engineer
description: "Complete environment for DevOps engineering"
category: devops
recommended_for:
  - DevOps engineers
  - SRE engineers
  - Infrastructure engineers

required_tools:
  - name: docker
    version: "20+"
  - name: git
    version: "2.30+"
  - name: kubectl
    version: "1.29+"

recommended_tools:
  - name: terraform
    version: "1.7+"
  - name: ansible
    version: "9.0+"
  - name: helm
    version: "3.14+"
  - name: aws-cli
    version: "2.15+"

optional_tools:
  - name: gcloud-cli
    version: "455+"
  - name: azure-cli
    version: "2.57+"
  - name: go
    version: "1.22+"

installation_phases:
  phase_1:
    name: "容器"
    tools: [git, docker, kubectl]
    description: "安装容器和Kubernetes"
  
  phase_2:
    name: "基础设施"
    tools: [terraform, ansible]
    description: "安装基础设施管理工具"
  
  phase_3:
    name: "云CLI"
    tools: [aws-cli, helm]
    description: "安装云CLI和Helm"

post_install_steps:
  - "echo 'DevOps工程环境准备完成!'"

compatible_templates:
  - cloud-native-developer
