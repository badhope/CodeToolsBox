# Full Stack Developer Preset

name: fullstack-developer
description: Complete full stack development preset with frontend, backend, and DevOps tools
version: 1.0.0

# Configuration files to apply
configs:
  - git
  - shell
  - vscode
  - npm
  - yarn
  - pip
  - docker
  - kubectl

# Required tools
required_tools:
  - git
  - nodejs
  - python3
  - docker
  - kubernetes
  - postgresql

# Recommended tools
recommended_tools:
  - react
  - vue
  - express
  - fastapi
  - redis
  - nginx

# Recommended VSCode extensions
vscode_extensions:
  - esbenp.prettier-vscode
  - dbaeumer.vscode-eslint
  - ms-python.python
  - ms-python.vscode-pylance
  - ms-azuretools.vscode-docker
  - eamodio.gitlens
  - bradlc.vscode-tailwindcss

# Environment variables
env_vars:
  NODE_ENV: development
  DEBUG: true
  LOG_LEVEL: debug
  DATABASE_URL: postgresql://localhost:5432
  REDIS_URL: redis://localhost:6379

# Quick start
quick_start:
  |
  echo "Full stack developer preset applied!"
  echo "Recommended commands:"
  echo "  git status"
  echo "  node --version"
  echo "  python3 --version"
  echo "  docker --version"
  echo "  code ."
