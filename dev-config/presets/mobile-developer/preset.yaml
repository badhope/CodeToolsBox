# Mobile Developer Preset

name: mobile-developer
description: Complete mobile development preset with Flutter, Android, and iOS tools
version: 1.0.0

# Configuration files to apply
configs:
  - git
  - shell
  - vscode
  - npm

# Required tools
required_tools:
  - git
  - nodejs
  - flutter
  - android-sdk

# Recommended tools
recommended_tools:
  - react-native
  - xcode
  - android-studio
  - cocoapods
  - gradle

# Recommended VSCode extensions
vscode_extensions:
  - Dart-Code.dart-code
  - Dart-Code.flutter
  - bradlc.vscode-tailwindcss
  - eamodio.gitlens

# Environment variables
env_vars:
  ANDROID_HOME: "$HOME/Android/Sdk"
  ANDROID_SDK_ROOT: "$HOME/Android/Sdk"
  ANDROID_AVD_HOME: "$HOME/.android/avd"
  PATH: "$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools"

# Quick start
quick_start:
  |
  echo "Mobile developer preset applied!"
  echo "Recommended commands:"
  echo "  git status"
  echo "  flutter --version"
  echo "  dart --version"
  echo "  code ."
