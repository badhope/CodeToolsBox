# Big Data Developer Preset

name: big-data-developer
description: Complete big data development preset with Spark, Kafka, Hadoop, and data tools
version: 1.0.0

# Configuration files to apply
configs:
  - git
  - shell
  - vscode
  - python
  - pip
  - docker

# Required tools
required_tools:
  - git
  - python3
  - docker
  - java
  - scala

# Recommended tools
recommended_tools:
  - spark
  - hadoop
  - kafka
  - hive
  - flink
  - jupyter

# Recommended VSCode extensions
vscode_extensions:
  - ms-python.python
  - ms-python.vscode-pylance
  - scalameta.metals
  - eamodio.gitlens

# Environment variables
env_vars:
  JAVA_HOME: "/usr/lib/jvm/java-11-openjdk"
  SCALA_HOME: "/usr/share/scala"
  SPARK_HOME: "/opt/spark"
  HADOOP_HOME: "/opt/hadoop"
  HADOOP_CONF_DIR: "/opt/hadoop/etc/hadoop"
  HADOOP_COMMON_LIB_NATIVE_DIR: "$HADOOP_HOME/lib/native"
  HADOOP_OPTS: "-Djava.library.path=$HADOOP_HOME/lib/native"

# Quick start
quick_start:
  |
  echo "Big data developer preset applied!"
  echo "Recommended commands:"
  echo "  git status"
  echo "  java -version"
  echo "  python3 --version"
  echo "  code ."
